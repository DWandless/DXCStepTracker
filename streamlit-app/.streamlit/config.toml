[server]
enableStaticServing = true

[client]
toolbarMode = "minimal"

[theme]
# Primary Colors - Blue to Orange Gradient Theme
primaryColor = "#55a0e2"                    # Vibrant blue
backgroundColor = "#E3F2FD"                 # Very light blue
secondaryBackgroundColor = "#E3F2FD"        # Soft blue secondary
linkColor = "#FF9800"                       # Orange accent
baseRadius = "large"
buttonRadius = "large"
borderColor = "#cadff0"

# Font Configuration
font = "Inter-Regular, sans-serif"
headingFont = "GT-Standard-L-Extended-Medium, sans-serif"
baseFontSize = 16
baseFontWeight = 400
headingFontWeights = 500

# Custom Font Faces
[[theme.fontFaces]]
family = "GT-Standard-L-Extended-Medium"
url = "assets/GT-Standard-L-Extended-Medium.otf"
weight = "500"
style = "normal"

[[theme.fontFaces]]
family = "Inter-Regular"
url = "assets/Inter-Regular.otf"
weight = "400"
style = "normal"